[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to the backend
[[redirects]]
  from = "/api/*"
  to = "https://capstone-backend-ga37.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
